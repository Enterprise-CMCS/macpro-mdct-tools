name: Workspace Setup

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches:
      - "main"
    paths:
      - "mdct-setup.sh"
      - ".github/workflows/workspace-setup.yml"

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      id-token: write
    steps:
      # rather than run from the repo this replicates the behavior of new devs onboarding
      - name: curl setup
        run: |
          repo="${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}"
          ref="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'main' }}"
          curl -o mdct-setup.sh "https://raw.githubusercontent.com/$repo/$ref/mdct-setup.sh" && chmod +x mdct-setup.sh && ./mdct-setup.sh

      # This job flexes the 1Password capability for MFP after the projects have been setup by using a 1password service account
      - name: one password test
        run: |
          cd ~/Projects/macpro-mdct-mfp
          source /tmp/.profile
          nvm install
          export OP_SERVICE_ACCOUNT_TOKEN=${{ secrets.MDCT_OP_TOKEN }}
          ./run update-env

  # Notify the tools channel on failure
  notify_on_failure:
    runs-on: ubuntu-latest
    if: failure()
    needs:
      - test
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        env:
          SLACK_TITLE: ":boom: The weekly workspace setup job failed in ${{ github.repository }}."
          MSG_MINIMAL: true
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
